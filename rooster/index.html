<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Zorgrooster</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #eef2f7;
        margin: 0;
    }

    header {
        background: #1a202c;
        color: white;
        padding: 15px;
        font-size: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 10px;
        padding: 20px;
    }

    .day {
        background: white;
        border-radius: 10px;
        padding: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        min-height: 120px;
    }

    .day h4 {
        margin: 0 0 10px 0;
        font-size: 14px;
        color: #2d3748;
    }

    .shift {
        font-size: 12px;
        padding: 5px;
        border-radius: 6px;
        margin-bottom: 5px;
        background: #e6fffa;
        border-left: 4px solid #38b2ac;
    }

    .evening {
        background: #fff5f5;
        border-left-color: #f56565;
    }

    .night {
        background: #ebf8ff;
        border-left-color: #4299e1;
    }
</style>
</head>
<body>

<header>Zorgrooster - Weekplanning (Demo)</header>

<div class="grid">

    <div class="day">
        <h4>Ma</h4>
        <div class="shift">Ochtend - Anna</div>
        <div class="shift evening">Avond - Mark</div>
    </div>

    <div class="day">
        <h4>Di</h4>
        <div class="shift">Ochtend - Lisa</div>
        <div class="shift night">Nacht - Omar</div>
    </div>

    <div class="day">
        <h4>Wo</h4>
        <div class="shift">Ochtend - Anna</div>
    </div>

    <div class="day">
        <h4>Do</h4>
        <div class="shift evening">Avond - Mark</div>
    </div>

    <div class="day">
        <h4>Vr</h4>
        <div class="shift">Ochtend - Lisa</div>
        <div class="shift evening">Avond - Anna</div>
    </div>

    <div class="day">
        <h4>Za</h4>
        <div class="shift night">Nacht - Omar</div>
    </div>

    <div class="day">
        <h4>Zo</h4>
        <div class="shift">Rustdag / Spoeddienst</div>
    </div>

</div>

</body>
</html>
