<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Dummy EPD Dashboard</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f7fb;
        color: #333;
    }

    header {
        background: #2b6cb0;
        color: white;
        padding: 15px 20px;
        font-size: 20px;
        font-weight: bold;
    }

    .container {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 20px;
        padding: 20px;
    }

    .card {
        background: white;
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .patient h2 {
        margin-top: 0;
    }

    .tag {
        display: inline-block;
        padding: 3px 8px;
        background: #e2e8f0;
        border-radius: 6px;
        margin-right: 5px;
        font-size: 12px;
    }

    .vitals {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }

    .vital {
        background: #f8fafc;
        padding: 10px;
        border-radius: 8px;
        text-align: center;
    }

    .notes {
        margin-top: 10px;
        background: #fffbea;
        padding: 10px;
        border-left: 4px solid #ecc94b;
    }
</style>
</head>
<body>

<header>EPD Dashboard - Demo Ziekenhuis</header>

<div class="container">

    <div class="card patient">
        <h2>Jan de Vries</h2>
        <p><strong>Leeftijd:</strong> 54</p>
        <p><strong>Patiënt ID:</strong> #A10293</p>
        <p>
            <span class="tag">Diabetes type 2</span>
            <span class="tag">Hypertensie</span>
        </p>
    </div>

    <div class="card">
        <h3>Vitale waarden</h3>
        <div class="vitals">
            <div class="vital">Bloeddruk<br><strong>140/85</strong></div>
            <div class="vital">Hartslag<br><strong>78 bpm</strong></div>
            <div class="vital">Temperatuur<br><strong>37.1°C</strong></div>
            <div class="vital">Saturatie<br><strong>96%</strong></div>
        </div>

        <div class="notes">
            <strong>Notities arts:</strong><br>
            Patiënt stabiel. Medicatie aangepast. Controle over 2 weken.
        </div>
    </div>

</div>

</body>
</html>
